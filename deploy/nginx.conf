# /etc/nginx/sites-available/rea
# Removable Evidence Analyzer reverse proxy.
# Frontend (static dist) -iig serve hiij, /api ba /ws -iig backend ruu damjuulna.
#
#   sudo ln -s /etc/nginx/sites-available/rea /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;

    # Frontend production build (npm run build -> frontend/dist).
    root /opt/rea/frontend/dist;
    index index.html;

    # SPA routing: bvh zamyg index.html ruu.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;   # urt scan-d zoriulan.
        client_max_body_size 0;
    }

    # WebSocket (real-time progress).
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}
